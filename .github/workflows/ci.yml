name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      CI: true
      SKIP_INSTRUMENTATION: '1'
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Debug Node / workspace
        run: |
          echo "--- node / npm versions ---"
          node -v
          npm -v
          echo "--- workspace pwd & ls ---"
          pwd
          ls -la
          echo "package-lock exists: $(if [ -f package-lock.json ]; then echo yes; else echo no; fi)"
          node -e "try{const lo=require('./package-lock.json').lockfileVersion; console.log('lockfileVersion:', lo);}catch(e){console.log('lockfileVersion:unknown')}"
        shell: bash

      - name: Install dependencies
        run: |
          # Prefer deterministic install, but fall back to npm install if lockfile mismatch occurs
          npm ci || npm install --no-audit --no-fund

      - name: Run lint
        run: npm run lint --if-present

      - name: Run tests
        run: npm run test

      - name: Run i18n check
        run: npm run check:i18n

      - name: Build (production)
        run: npm run build
