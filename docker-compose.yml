services:
  JellyTrack:
    image: ghcr.io/maelmoreau21/JellyTrack:latest
    container_name: JellyTrack_app
    env_file:
      - .env
    ports:
      - "${APP_PORT:-3000}:${PORT:-3000}"
    environment:
      # Database (entrypoint supports DB_* overrides first, then POSTGRES_*)
      POSTGRES_USER: ${POSTGRES_USER:-JellyTrack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-JellyTrack_password}
      POSTGRES_IP: ${POSTGRES_IP:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-JellyTrack}
      DB_HOST: ${DB_HOST:-}
      DB_PORT: ${DB_PORT:-}
      DB_USER: ${DB_USER:-}
      DB_PASSWORD: ${DB_PASSWORD:-}
      DB_NAME: ${DB_NAME:-}

      # Core app
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JELLYTRACK_MODE: ${JELLYTRACK_MODE:-single}
      PORT: ${PORT:-3000}
      APP_VERSION: ${APP_VERSION:-dev}

      # Jellyfin source
      JELLYFIN_URL: ${JELLYFIN_URL:-http://jellyfin:8096}
      JELLYFIN_API_KEY: ${JELLYFIN_API_KEY:-CHANGE_ME_JELLYFIN_API_KEY}
      JELLYFIN_SERVER_ID: ${JELLYFIN_SERVER_ID:-master}
      JELLYFIN_SERVER_NAME: ${JELLYFIN_SERVER_NAME:-Master Jellyfin}

      # Security
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-CHANGE_ME_ADMIN_PASSWORD}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-CHANGE_ME_NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      JELLYFIN_WEBHOOK_SECRET: ${JELLYFIN_WEBHOOK_SECRET:-CHANGE_ME_WEBHOOK_SECRET}

      # Runtime user and backup location
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      BACKUP_DIR: ${BACKUP_DIR:-/data/backups}
    volumes:
      - JellyTrack_backups:/data/backups
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - JellyTrack_net
    restart: unless-stopped

  postgres:
    image: postgres:18-alpine
    container_name: JellyTrack_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-JellyTrack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-JellyTrack_password}
      POSTGRES_DB: ${POSTGRES_DB:-JellyTrack}
    volumes:
      - JellyTrack_pgdata:/var/lib/postgresql/data
    networks:
      - JellyTrack_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-JellyTrack} -d ${POSTGRES_DB:-JellyTrack}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: JellyTrack_redis
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - JellyTrack_redisdata:/data
    networks:
      - JellyTrack_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  JellyTrack_net:
    driver: bridge

volumes:
  JellyTrack_pgdata:
  JellyTrack_redisdata:
  JellyTrack_backups:
